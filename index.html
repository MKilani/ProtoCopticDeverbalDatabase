<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coptic Excel-style Table</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-datatables@latest/dist/style.css">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 30px;
    background: #f9f9f9;
    color: #333;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #1a1a1a;
  }

  .table-container {
    overflow-x: auto;   /* horizontal scroll */
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1200px;  /* ensures scroll for many columns */
  }

  table th, table td {
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
    text-align: left;
  }

  table th {
    background: #007acc;
    color: white;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  table tr:hover {
    background-color: #f1f7ff;
  }

  .dataTables_wrapper {
    width: 100%;
  }
</style>
</head>
<body>
<h1>Coptic Forms Table</h1>

<div class="table-container">
  <table id="myTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/simple-datatables@latest"></script>
<script>
// CSV parser
function csvToArray(str, delimiter = ",") {
  const lines = str.trim().split("\n");
  const headers = lines[0].split(delimiter);
  const rows = lines.slice(1).map(line => {
    const values = line.split(delimiter);
    let obj = {};
    headers.forEach((header, i) => obj[header] = values[i] || "");
    return obj;
  });
  return { headers, rows };
}

// Fetch CSV from GitHub Pages
fetch('data.csv')
  .then(response => response.text())
  .then(text => {
    const { headers, rows } = csvToArray(text);
    
    const thead = document.querySelector("#myTable thead");
    const tbody = document.querySelector("#myTable tbody");

    // Create table header
    thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';

    // Create table rows
    rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = headers.map(h => `<td>${row[h]}</td>`).join('');
      tbody.appendChild(tr);
    });

    // Make table sortable and show all rows
    new simpleDatatables.DataTable("#myTable", {
      searchable: true,
      perPage: rows.length  // display all rows
    });
  });
</script>
</body>
</html>
